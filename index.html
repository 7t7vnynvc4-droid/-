<style>
/* ===== CSS Variables ===== */
:root {
  --coral: #FF6B6B;
  --coral-light: #FF8E8E;
  --mint: #4ECDC4;
  --mint-light: #7EDDD6;
  --sand: #FFF8F0;
  --navy: #2D3561;
  --navy-light: #3D4A7A;
  --yellow: #FFE66D;
  --gray-soft: #F5F5F7;
  --text-main: #1A1A2E;
  --text-sub: #6B7280;
  --fab-h: 72px; /* bottom action bar height */
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--sand);
  color: var(--text-main);
  min-height: 100vh;
  padding-bottom: calc(var(--fab-h) + 1rem);
  overscroll-behavior: none;
}
h1,h2,.display-font { font-family: 'Nunito','Noto Sans JP',sans-serif; }
input,select,button,textarea { font-family: inherit; }

/* ===== Header ===== */
.app-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  padding: 1.1rem 1rem 1.4rem;
  position: relative;
  overflow: hidden;
}
.app-header::before {
  content:''; position:absolute; top:-40px; right:-40px;
  width:140px; height:140px;
  background:rgba(255,255,255,0.05); border-radius:50%;
}
.app-header::after {
  content:''; position:absolute; bottom:-30px; left:30px;
  width:90px; height:90px;
  background:rgba(78,205,196,0.12); border-radius:50%;
}

/* ===== Section Cards ===== */
.section-card {
  background:#fff; border-radius:20px;
  padding:1.2rem; margin:0.7rem 0.9rem;
  box-shadow:0 2px 16px rgba(45,53,97,0.07);
}
.section-title {
  font-family:'Nunito',sans-serif; font-weight:800;
  font-size:0.95rem; color:var(--navy);
  letter-spacing:0.02em; margin-bottom:0.8rem;
  display:flex; align-items:center; gap:0.4rem;
}
.section-title .icon {
  width:26px; height:26px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:0.8rem; flex-shrink:0;
}

/* ===== Member Badges ===== */
.member-badge {
  display:inline-flex; align-items:center; gap:0.3rem;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);
  color:#fff; border-radius:999px;
  padding:0.3rem 0.6rem 0.3rem 0.75rem;
  font-size:0.82rem; font-weight:600; margin:0.2rem;
  animation:popIn 0.2s cubic-bezier(.34,1.56,.64,1);
}
.member-badge .del-btn {
  width:20px; height:20px; background:rgba(255,255,255,0.25);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:0.65rem; border:none; color:#fff;
  padding:0; flex-shrink:0; transition:background 0.15s;
  min-width:20px;
}
.member-badge .del-btn:active { background:rgba(255,107,107,0.8); }

/* ===== Inputs ===== */
.inp {
  width:100%; border:2px solid #E5E7EB; border-radius:12px;
  padding:0.65rem 0.85rem; font-size:0.95rem;
  color:var(--text-main); transition:border-color 0.2s, box-shadow 0.2s;
  outline:none; background:var(--gray-soft);
  -webkit-appearance:none; appearance:none;
}
.inp:focus { border-color:var(--mint); box-shadow:0 0 0 3px rgba(78,205,196,0.18); background:#fff; }
select.inp { cursor:pointer; }

/* Amount Input with ¥ prefix */
.amount-wrap { position:relative; }
.amount-prefix {
  position:absolute; left:0.85rem; top:50%; transform:translateY(-50%);
  font-family:'Nunito',sans-serif; font-weight:800;
  color:var(--text-sub); font-size:1rem; pointer-events:none; z-index:1;
}
.inp-amount {
  width:100%; border:2px solid #E5E7EB; border-radius:12px;
  padding:0.65rem 0.85rem 0.65rem 1.8rem;
  font-size:1rem; font-family:'Nunito',sans-serif; font-weight:700;
  color:var(--text-main); transition:border-color 0.2s, box-shadow 0.2s;
  outline:none; background:var(--gray-soft);
  -webkit-appearance:none; appearance:none;
}
.inp-amount:focus { border-color:var(--mint); box-shadow:0 0 0 3px rgba(78,205,196,0.18); background:#fff; }

/* ===== Buttons ===== */
.btn-primary {
  background:linear-gradient(135deg,var(--coral) 0%,#FF4757 100%);
  color:#fff; border:none; border-radius:12px;
  padding:0.8rem 1.2rem;
  font-family:'Nunito',sans-serif; font-weight:800; font-size:0.95rem;
  cursor:pointer; transition:transform 0.12s, box-shadow 0.12s;
  box-shadow:0 4px 14px rgba(255,107,107,0.35);
  -webkit-appearance:none; touch-action:manipulation;
}
.btn-primary:active { transform:scale(0.96); box-shadow:0 2px 6px rgba(255,107,107,0.3); }
.btn-sm {
  background:var(--gray-soft); border:2px solid #E5E7EB; border-radius:10px;
  padding:0.5rem 0.9rem;
  font-family:'Nunito',sans-serif; font-weight:700; font-size:0.85rem;
  cursor:pointer; color:var(--navy); transition:all 0.15s;
  touch-action:manipulation;
}
.btn-sm:active { border-color:var(--mint); background:rgba(78,205,196,0.1); }
.btn-danger {
  background:rgba(255,107,107,0.1); border:2px solid rgba(255,107,107,0.3);
  border-radius:10px; padding:0.45rem 0.9rem;
  font-family:'Nunito',sans-serif; font-weight:700; font-size:0.82rem;
  cursor:pointer; color:var(--coral); transition:all 0.15s;
  touch-action:manipulation;
}
.btn-danger:active { background:rgba(255,107,107,0.2); }

/* ===== Target Chips ===== */
.target-check-wrap { display:flex; flex-wrap:wrap; gap:0.4rem; }
.target-chip {
  display:inline-flex; align-items:center; gap:0.3rem;
  border:2px solid #E5E7EB; border-radius:999px;
  padding:0.4rem 0.8rem; font-size:0.84rem; font-weight:600;
  cursor:pointer; transition:all 0.12s; user-select:none;
  color:var(--text-sub); background:var(--gray-soft);
  touch-action:manipulation; min-height:36px;
}
.target-chip.checked { border-color:var(--mint); background:rgba(78,205,196,0.12); color:var(--navy); }

/* ===== History ===== */
.history-item {
  display:flex; align-items:flex-start; gap:0.55rem;
  padding:0.75rem; border-radius:14px;
  background:var(--gray-soft); margin-bottom:0.5rem;
  animation:slideIn 0.2s ease;
}
.history-item:last-child { margin-bottom:0; }
.history-dot {
  width:36px; height:36px; border-radius:10px;
  background:linear-gradient(135deg,var(--mint) 0%,var(--mint-light) 100%);
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:0.9rem; flex-shrink:0;
}
.history-content { flex:1; min-width:0; }
.history-name {
  font-weight:700; font-size:0.9rem; color:var(--navy);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.history-sub { font-size:0.74rem; color:var(--text-sub); margin-top:0.12rem; line-height:1.4; }
.history-amount {
  font-family:'Nunito',sans-serif; font-weight:800;
  font-size:0.95rem; color:var(--coral); white-space:nowrap; flex-shrink:0;
}
.history-actions { display:flex; gap:0.25rem; flex-shrink:0; }
.icon-btn {
  background:none; border:none; cursor:pointer;
  color:#CBD5E1; font-size:1rem; padding:0.25rem;
  transition:color 0.15s; min-width:28px; min-height:28px;
  display:flex; align-items:center; justify-content:center;
}
.icon-btn:active { color:var(--coral); transform:scale(0.9); }
.icon-btn.edit:active { color:var(--mint); }

/* ===== Settlement Card ===== */
.settlement-card {
  background:linear-gradient(135deg,var(--navy) 0%,#1A1A2E 100%);
  border-radius:20px; padding:1.25rem;
  margin:0.7rem 0.9rem 0.9rem;
  box-shadow:0 8px 30px rgba(45,53,97,0.25);
}
.settlement-title {
  font-family:'Nunito',sans-serif; font-weight:900;
  color:#fff; font-size:1rem;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:1rem;
}
.settlement-row {
  display:flex; align-items:center; gap:0.5rem;
  background:rgba(255,255,255,0.07); border-radius:14px;
  padding:0.75rem 1rem; margin-bottom:0.5rem;
  animation:popIn 0.2s cubic-bezier(.34,1.56,.64,1);
}
.settlement-row:last-child { margin-bottom:0; }
.s-from { font-weight:700; color:#fff; font-size:0.9rem; white-space:nowrap; }
.s-arrow { color:var(--yellow); font-size:0.95rem; flex-shrink:0; }
.s-to { font-weight:700; color:#fff; font-size:0.9rem; white-space:nowrap; }
.s-amount {
  font-family:'Nunito',sans-serif; font-weight:900;
  font-size:1rem; color:var(--yellow); white-space:nowrap; margin-left:auto;
}
.settled-msg { text-align:center; color:rgba(255,255,255,0.5); font-size:0.9rem; padding:0.8rem 0 0.3rem; }

.balance-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:0.38rem 0; border-bottom:1px solid rgba(255,255,255,0.06); font-size:0.83rem;
}
.balance-row:last-child { border-bottom:none; }
.balance-name { color:rgba(255,255,255,0.65); }
.balance-val { font-family:'Nunito',sans-serif; font-weight:700; }
.balance-pos { color:var(--mint-light); }
.balance-neg { color:var(--coral-light); }
.balance-zero { color:rgba(255,255,255,0.35); }

/* ===== Tab Toggle ===== */
.tab-toggle {
  display:flex; background:rgba(255,255,255,0.08);
  border-radius:12px; padding:3px; margin-bottom:0.85rem;
}
.tab-btn {
  flex:1; padding:0.45rem; border-radius:10px;
  font-family:'Nunito',sans-serif; font-weight:700; font-size:0.82rem;
  border:none; cursor:pointer; background:none; color:rgba(255,255,255,0.5);
  transition:all 0.2s; touch-action:manipulation;
}
.tab-btn.active { background:rgba(255,255,255,0.15); color:#fff; }

/* ===== Total Chip ===== */
.total-chip {
  display:inline-flex; align-items:center; gap:0.3rem;
  background:rgba(78,205,196,0.15); color:var(--navy);
  border-radius:999px; padding:0.2rem 0.7rem;
  font-family:'Nunito',sans-serif; font-weight:800; font-size:0.8rem;
}

/* ===== Sort Toggle ===== */
.sort-toggle {
  display:flex; gap:0.3rem; margin-left:auto;
}
.sort-btn {
  font-size:0.72rem; font-weight:700;
  padding:0.2rem 0.55rem; border-radius:999px;
  border:1.5px solid #E5E7EB; background:none;
  cursor:pointer; color:var(--text-sub); transition:all 0.15s;
  touch-action:manipulation;
}
.sort-btn.active { border-color:var(--mint); color:var(--navy); background:rgba(78,205,196,0.1); }

/* ===== Quick Buttons ===== */
.quick-btns { display:flex; gap:0.35rem; }
.quick-btn {
  font-size:0.72rem; font-weight:700;
  padding:0.25rem 0.6rem; border-radius:999px;
  border:1.5px solid #E5E7EB; background:none;
  cursor:pointer; color:var(--text-sub); transition:all 0.15s;
  touch-action:manipulation;
}
.quick-btn:active { border-color:var(--mint); color:var(--navy); }

/* ===== Bottom FAB Bar ===== */
.fab-bar {
  position:fixed; bottom:0; left:0; right:0;
  height:var(--fab-h);
  background:#fff; border-top:1px solid #E5E7EB;
  display:flex; align-items:center; justify-content:space-around;
  padding:0 0.5rem env(safe-area-inset-bottom,0);
  z-index:100;
  box-shadow:0 -4px 20px rgba(45,53,97,0.08);
}
.fab-item {
  display:flex; flex-direction:column; align-items:center; gap:0.18rem;
  padding:0.4rem 0.6rem; border-radius:14px; cursor:pointer;
  transition:transform 0.12s, background 0.12s;
  border:none; background:none; flex:1; max-width:80px;
  touch-action:manipulation; min-height:52px; justify-content:center;
}
.fab-item:active { transform:scale(0.91); background:var(--gray-soft); }
.fab-item .fab-icon { font-size:1.3rem; line-height:1; }
.fab-item .fab-label { font-size:0.62rem; font-weight:700; color:var(--text-sub); white-space:nowrap; }
.fab-add { background:linear-gradient(135deg,var(--coral) 0%,#FF4757 100%) !important; border-radius:16px !important; }
.fab-add .fab-icon { font-size:1.4rem; }
.fab-add .fab-label { color:rgba(255,255,255,0.9) !important; }

/* ===== Modal ===== */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.5);
  z-index:200; display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.modal-overlay.open { opacity:1; pointer-events:auto; }
.modal-sheet {
  background:#fff; border-radius:24px 24px 0 0;
  width:100%; max-height:90vh; overflow-y:auto;
  padding:1.25rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom,0));
  transform:translateY(100%); transition:transform 0.25s cubic-bezier(.32,.72,0,1);
  -webkit-overflow-scrolling:touch;
}
.modal-overlay.open .modal-sheet { transform:translateY(0); }
.modal-handle {
  width:40px; height:4px; background:#E5E7EB;
  border-radius:999px; margin:0 auto 1.1rem;
}
.modal-title {
  font-family:'Nunito',sans-serif; font-weight:900;
  font-size:1.1rem; color:var(--navy); margin-bottom:1rem;
}

/* ===== Confirm Dialog ===== */
.confirm-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.5);
  z-index:300; display:flex; align-items:center; justify-content:center;
  padding:1rem; opacity:0; pointer-events:none; transition:opacity 0.15s;
}
.confirm-overlay.open { opacity:1; pointer-events:auto; }
.confirm-box {
  background:#fff; border-radius:20px; padding:1.5rem;
  max-width:320px; width:100%;
  transform:scale(0.9); transition:transform 0.15s;
}
.confirm-overlay.open .confirm-box { transform:scale(1); }
.confirm-title {
  font-family:'Nunito',sans-serif; font-weight:900;
  font-size:1.05rem; color:var(--navy); margin-bottom:0.5rem;
}
.confirm-msg { font-size:0.87rem; color:var(--text-sub); line-height:1.5; margin-bottom:1.2rem; }
.confirm-btns { display:flex; gap:0.5rem; }
.confirm-btns button { flex:1; padding:0.7rem; border-radius:12px; font-weight:700; font-size:0.9rem; cursor:pointer; border:none; touch-action:manipulation; }
.confirm-cancel { background:var(--gray-soft); color:var(--text-sub); }
.confirm-ok { background:linear-gradient(135deg,var(--coral),#FF4757); color:#fff; }

/* ===== Toast ===== */
.toast {
  position:fixed; bottom:calc(var(--fab-h) + 0.75rem); left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--navy); color:#fff;
  padding:0.6rem 1.2rem; border-radius:999px;
  font-size:0.85rem; font-weight:600;
  white-space:nowrap; z-index:400;
  opacity:0; transition:all 0.2s; pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ===== Error Msg ===== */
.error-msg { font-size:0.78rem; color:var(--coral); font-weight:600; margin-top:0.3rem; display:none; }
.error-msg.show { display:block; }

/* ===== Misc ===== */
.divider { height:1px; background:#F0F0F0; margin:0.7rem 0; }
.empty-state { text-align:center; color:var(--text-sub); font-size:0.85rem; padding:1.3rem 0 0.3rem; }
.empty-state .big { font-size:2rem; margin-bottom:0.35rem; }

/* ===== Animations ===== */
@keyframes popIn {
  0% { transform:scale(0.85); opacity:0; }
  100% { transform:scale(1); opacity:1; }
}
@keyframes slideIn {
  0% { transform:translateY(8px); opacity:0; }
  100% { transform:translateY(0); opacity:1; }
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20% { transform:translateX(-6px); }
  40% { transform:translateX(6px); }
  60% { transform:translateX(-4px); }
  80% { transform:translateX(4px); }
}
.shake { animation:shake 0.35s ease; }

/* ===== Image Export Card ===== */
#exportCard {
  background:linear-gradient(160deg,#2D3561 0%,#1A1A2E 60%,#0D1120 100%);
  padding:0; width:400px; border-radius:0;
  font-family:'Nunito','Noto Sans JP',sans-serif;
  overflow:hidden;
}
/* top accent bar */
#exportCard .ec-accent {
  height:5px;
  background:linear-gradient(90deg,#4ECDC4 0%,#FFE66D 50%,#FF6B6B 100%);
}
#exportCard .ec-body { padding:1.6rem 1.5rem 1.2rem; }
/* header */
#exportCard .ec-app { color:rgba(255,255,255,0.35); font-size:0.65rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:0.3rem; }
#exportCard .ec-title { color:#fff; font-size:1.35rem; font-weight:900; line-height:1.2; margin-bottom:0.15rem; }
#exportCard .ec-date { color:rgba(255,255,255,0.45); font-size:0.72rem; margin-bottom:1rem; }
/* meta chips row */
#exportCard .ec-meta { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.1rem; }
#exportCard .ec-chip {
  background:rgba(255,255,255,0.08); border-radius:999px;
  padding:0.25rem 0.7rem; font-size:0.72rem; font-weight:700; color:rgba(255,255,255,0.6);
  display:inline-flex; align-items:center; gap:0.3rem;
}
#exportCard .ec-chip-val { color:#fff; }
/* total big */
#exportCard .ec-total-box {
  background:rgba(255,230,109,0.1); border:1px solid rgba(255,230,109,0.25);
  border-radius:14px; padding:0.75rem 1rem; margin-bottom:1.1rem;
  display:flex; align-items:center; justify-content:space-between;
}
#exportCard .ec-total-label { color:rgba(255,255,255,0.55); font-size:0.75rem; font-weight:700; }
#exportCard .ec-total-val { color:#FFE66D; font-size:1.3rem; font-weight:900; }
/* section headers */
#exportCard .ec-section {
  font-size:0.68rem; font-weight:800; letter-spacing:0.1em;
  color:rgba(255,255,255,0.35); text-transform:uppercase;
  margin-bottom:0.45rem; margin-top:0.9rem;
  display:flex; align-items:center; gap:0.4rem;
}
#exportCard .ec-section::before {
  content:''; display:inline-block; width:3px; height:10px;
  border-radius:2px;
}
#exportCard .ec-section.transfer::before { background:#4ECDC4; }
#exportCard .ec-section.balance::before  { background:#FF6B6B; }
/* transfer row */
#exportCard .ec-row {
  background:rgba(255,255,255,0.06); border-radius:10px;
  padding:0.55rem 0.85rem; margin-bottom:0.35rem;
  display:flex; align-items:center; gap:0.5rem;
  color:#fff; font-size:0.85rem; font-weight:700;
}
#exportCard .ec-arrow { color:#4ECDC4; font-size:0.8rem; flex-shrink:0; }
#exportCard .ec-amount { margin-left:auto; color:#FFE66D; font-weight:900; white-space:nowrap; }
/* balance row */
#exportCard .ec-bal {
  display:flex; justify-content:space-between; align-items:center;
  padding:0.35rem 0; border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:0.8rem;
}
#exportCard .ec-bal:last-child { border-bottom:none; }
#exportCard .ec-bal-name { color:rgba(255,255,255,0.6); font-weight:600; }
#exportCard .ec-bal-pos { color:#7EDDD6; font-weight:800; font-family:'Nunito',sans-serif; }
#exportCard .ec-bal-neg { color:#FF8E8E; font-weight:800; font-family:'Nunito',sans-serif; }

<body>

<!-- ===== Header ===== -->
<div class="app-header">
  <div style="position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;">

<!-- ===== ② Add Item Section ===== -->
<div class="section-card" id="addSection">
  <div class="section-title">
    <span class="icon" style="background:rgba(255,107,107,0.12);">💳</span>
    立替・品目を追加

  <div style="display:grid;gap:0.6rem;">
    <!-- Item name -->
    <div>
      <label style="font-size:0.78rem;font-weight:700;color:var(--text-sub);display:block;margin-bottom:0.28rem;">項目・店名</label>
      <input id="itemName" class="inp" placeholder="例: 居酒屋Aのピザ" maxlength="30" autocomplete="off">
    </div>

    <!-- Amount + Payer -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
      <div>
        <label style="font-size:0.78rem;font-weight:700;color:var(--text-sub);display:block;margin-bottom:0.28rem;">金額 (円)</label>
        <div class="amount-wrap">
          <span class="amount-prefix">¥</span>
          <input id="itemAmount" class="inp-amount" type="tel" inputmode="numeric" placeholder="2,400" autocomplete="off">
        </div>
      </div>
      <div>
        <label style="font-size:0.78rem;font-weight:700;color:var(--text-sub);display:block;margin-bottom:0.28rem;">支払った人</label>
        <select id="itemPayer" class="inp">
          <option value="">選択</option>
        </select>
      </div>
    </div>

    <!-- Payer include toggle -->
    <div style="display:flex;align-items:center;gap:0.5rem;background:var(--gray-soft);border-radius:10px;padding:0.5rem 0.75rem;">
      <input type="checkbox" id="payerIncluded" checked style="width:18px;height:18px;accent-color:var(--mint);cursor:pointer;flex-shrink:0;">
      <label for="payerIncluded" style="font-size:0.82rem;font-weight:600;color:var(--navy);cursor:pointer;line-height:1.3;">
        支払者も割り勘対象に含める

    <!-- Target chips -->
    <div>
      <div style="display:flex;align-items:center;margin-bottom:0.35rem;">
        <label style="font-size:0.78rem;font-weight:700;color:var(--text-sub);">対象者</label>
        <div class="quick-btns" style="margin-left:auto;">

          <button class="quick-btn" onclick="checkAll(false)">クリア</button>
        </div>

      <div id="targetChips" class="target-check-wrap">
        <span style="font-size:0.82rem;color:var(--text-sub);">メンバーを追加してください</span>

  </div>

  <div id="itemError" class="error-msg"></div>
  <button class="btn-primary" style="width:100%;margin-top:0.85rem;" onclick="addItem()">＋ 追加する</button>
</div>

<!-- ===== ③ History Section ===== -->
<div class="section-card" id="historySection">
  <div style="display:flex;align-items:center;gap:0.4rem;margin-bottom:0.8rem;">
    <div class="section-title" style="margin-bottom:0;flex-shrink:0;">
      <span class="icon" style="background:rgba(255,230,109,0.25);">📋</span>
      入力履歴
    </div>
    <div id="totalChip" class="total-chip" style="display:none;">
      合計 <span id="totalAmt">0</span>円
    </div>
    <div class="sort-toggle" style="margin-left:auto;">
      <button class="sort-btn active" id="sortNew" onclick="setSort('new')">新しい順</button>
      <button class="sort-btn" id="sortOld" onclick="setSort('old')">古い順</button>
    </div>
  </div>
  <div id="historyList">
    <div class="empty-state"><div class="big">📝</div>まだ項目がありません</div>
  </div>
</div>

<!-- ===== ④ Settlement Section ===== -->
<div class="settlement-card" id="settlementSection">
  <div class="settlement-title">
    <div style="display:flex;align-items:center;gap:0.5rem;">💰 精算結果</div>

  <div id="balanceView" style="display:none;">

<div style="text-align:center;font-size:0.7rem;color:#B0B8C8;padding-bottom:0.3rem;">データはこのブラウザに保存されます</div>

<!-- ===== Bottom FAB Bar ===== -->
<div class="fab-bar">
  <button class="fab-item" onclick="scrollToAdd()">
    <span class="fab-icon">✏️</span>
    <span class="fab-label">入力</span>
  </button>
  <button class="fab-item fab-add" onclick="addItem()">

    <span class="fab-icon">📤</span>

  </button>
</div>

<!-- ===== Edit Modal ===== -->
<div class="modal-overlay" id="editModal" onclick="closeEditModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ 項目を編集</div>
    <div style="display:grid;gap:0.6rem;">
      <div>
        <label style="font-size:0.78rem;font-weight:700;color:var(--text-sub);display:block;margin-bottom:0.28rem;">項目・店名</label>
        <input id="editName" class="inp" maxlength="30" autocomplete="off">
      </div>
      <div>
        <label style="font-size:0.78rem;font-weight:700;color:var(--text-sub);display:block;margin-bottom:0.28rem;">金額 (円)</label>
        <div class="amount-wrap">
          <span class="amount-prefix">¥</span>
          <input id="editAmount" class="inp-amount" type="tel" inputmode="numeric" autocomplete="off">
        </div>
      </div>
      <div>
        <label style="font-size:0.78rem;font-weight:700;color:var(--text-sub);display:block;margin-bottom:0.28rem;">支払った人</label>
        <select id="editPayer" class="inp"></select>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;background:var(--gray-soft);border-radius:10px;padding:0.5rem 0.75rem;">
        <input type="checkbox" id="editPayerIncluded" style="width:18px;height:18px;accent-color:var(--mint);cursor:pointer;flex-shrink:0;">
        <label for="editPayerIncluded" style="font-size:0.82rem;font-weight:600;color:var(--navy);cursor:pointer;">支払者も割り勘対象に含める</label>
      </div>
      <div>
        <div style="display:flex;align-items:center;margin-bottom:0.35rem;">
          <label style="font-size:0.78rem;font-weight:700;color:var(--text-sub);">対象者</label>
          <div class="quick-btns" style="margin-left:auto;">
            <button class="quick-btn" onclick="editCheckAll(true)">全員</button>
            <button class="quick-btn" onclick="editCheckAll(false)">クリア</button>
          </div>
        </div>
        <div id="editTargetChips" class="target-check-wrap"></div>
      </div>
    </div>
    <div id="editError" class="error-msg"></div>
    <button class="btn-primary" style="width:100%;margin-top:0.85rem;" onclick="saveEdit()">保存する</button>
  </div>
</div>

<!-- ===== Confirm Dialog ===== -->
<div class="confirm-overlay" id="confirmDialog">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle">確認</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">キャンセル</button>
      <button class="confirm-ok" id="confirmOkBtn" onclick="doConfirm()">削除する</button>
    </div>
  </div>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<!-- Hidden export card for image generation -->
<div style="position:fixed;left:-9999px;top:-9999px;z-index:-1;">
  <div id="exportCard"></div>
</div>

<script>
/* =============================================
   DATA LAYER (Firebase-ready abstraction)
   Replace these functions to switch to cloud
   ============================================= */
const DB = {
  get(key) {
    try { return JSON.parse(localStorage.getItem('wk_' + key) || 'null'); } catch(e) { return null; }
  },
  set(key, val) {
    try { localStorage.setItem('wk_' + key, JSON.stringify(val)); } catch(e) {}
  },
  remove(key) {
    localStorage.removeItem('wk_' + key);
  },
  clear() {
    ['members','items'].forEach(k => localStorage.removeItem('wk_' + k));
  }
};

/* =============================================
   STATE
   ============================================= */
let members = [];
let items = [];
let sortOrder = 'new'; // 'new' | 'old'
let editingId = null;
let confirmCallback = null;

/* =============================================
   INIT & PERSIST
   ============================================= */
function loadData() {
  try {
    const m = DB.get('members');
    members = Array.isArray(m) ? m.filter(v => typeof v === 'string' && v.length > 0) : [];
  } catch(e) { members = []; }
  try {
    const it = DB.get('items');
    items = Array.isArray(it) ? it.filter(v =>
      v && typeof v === 'object' &&
      typeof v.id === 'number' &&
      typeof v.amount === 'number' && v.amount > 0 &&
      typeof v.payer === 'string' && v.payer.length > 0 &&
      Array.isArray(v.targets) && v.targets.length > 0
    ) : [];
  } catch(e) { items = []; }
}
function saveData() {
  DB.set('members', members);
  DB.set('items', items);
}

/* =============================================
   HELPERS
   ============================================= */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function fmtAmt(n) { return Number(n).toLocaleString('ja-JP'); }

// Parse comma-formatted number input
function parseAmt(s) {
  const n = parseInt(String(s).replace(/[,，￥¥\s]/g,''), 10);
  return (isNaN(n) || n <= 0) ? 0 : n;
}

// Format amount input with commas as user types
function formatAmtInput(el) {
  let raw = el.value.replace(/[^0-9]/g,'');
  if (raw === '') { el.value = ''; return; }
  el.value = Number(raw).toLocaleString('ja-JP');
}

// Show toast notification
function showToast(msg, duration=2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// Shake animation helper
function shakeEl(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 400);
}

/* =============================================
   CONFIRM DIALOG
   ============================================= */
function showConfirm(title, msg, okLabel, cb) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmOkBtn').textContent = okLabel || '削除する';
  confirmCallback = cb;
  document.getElementById('confirmDialog').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmDialog').classList.remove('open');
  confirmCallback = null;
}
function doConfirm() {
  const cb = confirmCallback;
  closeConfirm();
  if (cb) cb();
}

/* =============================================
   MEMBER MANAGEMENT
   ============================================= */
function addMember() {
  const inp = document.getElementById('memberInput');
  const errEl = document.getElementById('memberError');
  const name = inp.value.trim();
  errEl.classList.remove('show');

  if (!name) { shakeEl('memberInput'); return; }
  if (members.includes(name)) {
    errEl.classList.add('show');
    shakeEl('memberInput');
    setTimeout(() => errEl.classList.remove('show'), 2000);
    return;
  }
  members.push(name);
  inp.value = '';
  saveData();
  renderMembers();
  renderPayerSelect();
  renderTargetChips();
  renderSettlement();
}

// ① Member delete: confirm + cascade cleanup
function confirmDeleteMember(name) {
  const related = items.filter(it => it.payer === name || it.targets.includes(name));
  const msg = related.length > 0
    ? `「${name}」を削除すると、関連する履歴 ${related.length} 件も削除されます。よろしいですか？`
    : `「${name}」を削除しますか？`;
  showConfirm('メンバーを削除', msg, '削除する', () => deleteMember(name));
}

function deleteMember(name) {
  members = members.filter(m => m !== name);
  // Rebuild items without mutating originals: drop payer-is-name, rebuild targets without name, drop if targets empty
  items = items
    .filter(it => it.payer !== name)
    .map(it => ({ ...it, targets: it.targets.filter(t => t !== name) }))
    .filter(it => it.targets.length > 0);
  saveData();
  renderMembers();
  renderPayerSelect();
  renderTargetChips();
  renderHistory();
  renderSettlement();
  showToast(`${name} を削除しました`);
}

function renderMembers() {
  const wrap = document.getElementById('memberBadges');
  if (members.length === 0) {
    wrap.innerHTML = '<span style="font-size:0.82rem;color:var(--text-sub);">まだメンバーがいません</span>';
    return;
  }
  wrap.innerHTML = members.map(m => `
    <span class="member-badge">
      ${escHtml(m)}
      <button class="del-btn" onclick="confirmDeleteMember('${escJs(m)}')" aria-label="削除">✕</button>
    </span>
  `).join('');
}

function renderPayerSelect(selectId='itemPayer') {
  const sel = document.getElementById(selectId);
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">選択してください</option>' +
    members.map(m => `<option value="${escHtml(m)}"${m===cur?' selected':''}>${escHtml(m)}</option>`).join('');
}

/* =============================================
   TARGET CHIPS (add form)
   ============================================= */
function renderTargetChips() {
  const wrap = document.getElementById('targetChips');
  if (members.length === 0) {
    wrap.innerHTML = '<span style="font-size:0.82rem;color:var(--text-sub);">メンバーを追加してください</span>';
    return;
  }
  wrap.innerHTML = members.map(m => buildChipHtml(m, true)).join('');
  attachChipEvents('targetChips');
}

function buildChipHtml(m, checked) {
  return `<button type="button" class="target-chip${checked?' checked':''}" data-name="${escHtml(m)}" onclick="toggleTargetChip(this)">
    ${checked?'✓ ':''}${escHtml(m)}
  </button>`;
}

function toggleTargetChip(btn) {
  const checked = btn.classList.toggle('checked');
  btn.textContent = (checked ? '✓ ' : '') + btn.dataset.name;
}

function attachChipEvents() {} // chips use inline onclick now

function checkAll(val) {
  document.querySelectorAll('#targetChips .target-chip').forEach(btn => {
    btn.classList.toggle('checked', val);
    btn.textContent = (val ? '✓ ' : '') + btn.dataset.name;
  });
}

function getCheckedTargets(containerId) {
  return [...document.querySelectorAll(`#${containerId} .target-chip.checked`)].map(b => b.dataset.name);
}

/* =============================================
   ADD ITEM
   ============================================= */
function addItem() {
  const nameEl = document.getElementById('itemName');
  const amtEl = document.getElementById('itemAmount');
  const payerEl = document.getElementById('itemPayer');
  const errEl = document.getElementById('itemError');
  const payerIncluded = document.getElementById('payerIncluded').checked;

  errEl.classList.remove('show');

  if (members.length === 0) {
    errEl.textContent = 'メンバーを先に追加してください';
    errEl.classList.add('show'); return;
  }

  const rawAmt = parseAmt(amtEl.value);
  if (rawAmt <= 0) {
    errEl.textContent = '金額を入力してください';
    errEl.classList.add('show');
    shakeEl('itemAmount'); return;
  }

  const payer = payerEl.value;
  if (!payer) {
    errEl.textContent = '支払った人を選択してください';
    errEl.classList.add('show');
    shakeEl('itemPayer'); return;
  }

  let targets = getCheckedTargets('targetChips');
  // Auto-add/remove payer based on toggle
  if (payerIncluded && !targets.includes(payer)) targets.push(payer);
  if (!payerIncluded) targets = targets.filter(t => t !== payer);

  if (targets.length === 0) {
    errEl.textContent = '対象者を1人以上選択してください';
    errEl.classList.add('show'); return;
  }

  const name = nameEl.value.trim() || '無題';
  items.push({ id: Date.now(), name, amount: rawAmt, payer, targets, payerIncluded });
  nameEl.value = '';
  amtEl.value = '';

  saveData();
  renderHistory();
  renderSettlement();
  showToast('追加しました ✓');
}

/* =============================================
   HISTORY
   ============================================= */
function setSort(order) {
  sortOrder = order;
  document.getElementById('sortNew').classList.toggle('active', order==='new');
  document.getElementById('sortOld').classList.toggle('active', order==='old');
  renderHistory();
}

function renderHistory() {
  const wrap = document.getElementById('historyList');
  const chip = document.getElementById('totalChip');
  const totalEl = document.getElementById('totalAmt');

  if (items.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><div class="big">📝</div>まだ項目がありません</div>';
    chip.style.display = 'none';
    return;
  }

  const sorted = [...items].sort((a,b) => sortOrder==='new' ? b.id - a.id : a.id - b.id);
  const total = items.reduce((s,i) => s + i.amount, 0);
  chip.style.display = 'inline-flex';
  totalEl.textContent = fmtAmt(total);

  wrap.innerHTML = sorted.map(it => `
    <div class="history-item" id="hi_${it.id}">
      <div class="history-dot">🛒</div>
      <div class="history-content">
        <div class="history-name">${escHtml(it.name)}</div>
        <div class="history-sub">
          支払: ${escHtml(it.payer)} ／ 対象: ${it.targets.map(escHtml).join(', ')}
        </div>
      </div>
      <div class="history-amount">¥${fmtAmt(it.amount)}</div>
      <div class="history-actions">
        <button class="icon-btn edit" onclick="openEditModal(${it.id})" aria-label="編集">✏️</button>
        <button class="icon-btn" onclick="confirmDeleteItem(${it.id})" aria-label="削除">🗑</button>
      </div>
    </div>
  `).join('');
}

function confirmDeleteItem(id) {
  const it = items.find(i => i.id === id);
  if (!it) return;
  showConfirm('項目を削除', `「${it.name}」を削除しますか？`, '削除する', () => deleteItem(id));
}

function deleteItem(id) {
  items = items.filter(it => it.id !== id);
  saveData();
  renderHistory();
  renderSettlement();
  showToast('削除しました');
}

/* =============================================
   EDIT MODAL (④)
   ============================================= */
function openEditModal(id) {
  const it = items.find(i => i.id === id);
  if (!it) return;
  editingId = id;

  document.getElementById('editName').value = it.name;
  document.getElementById('editAmount').value = fmtAmt(it.amount);
  document.getElementById('editPayerIncluded').checked = it.payerIncluded !== false;
  document.getElementById('editError').classList.remove('show');

  // Payer select
  const sel = document.getElementById('editPayer');
  sel.innerHTML = '<option value="">選択</option>' +
    members.map(m => `<option value="${escHtml(m)}"${m===it.payer?' selected':''}>${escHtml(m)}</option>`).join('');

  // Target chips
  const wrap = document.getElementById('editTargetChips');
  wrap.innerHTML = members.map(m => buildChipHtml(m, it.targets.includes(m))).join('');

  document.getElementById('editModal').classList.add('open');
}

function closeEditModal(e) {
  if (e && e.target !== document.getElementById('editModal')) return;
  document.getElementById('editModal').classList.remove('open');
  editingId = null;
}

function editCheckAll(val) {
  document.querySelectorAll('#editTargetChips .target-chip').forEach(btn => {
    btn.classList.toggle('checked', val);
    btn.textContent = (val ? '✓ ' : '') + btn.dataset.name;
  });
}

function saveEdit() {
  const errEl = document.getElementById('editError');
  errEl.classList.remove('show');

  const rawAmt = parseAmt(document.getElementById('editAmount').value);
  if (rawAmt <= 0) {
    errEl.textContent = '金額を入力してください'; errEl.classList.add('show'); return;
  }
  const payer = document.getElementById('editPayer').value;
  if (!payer) {
    errEl.textContent = '支払った人を選択してください'; errEl.classList.add('show'); return;
  }
  const payerIncluded = document.getElementById('editPayerIncluded').checked;
  let targets = getCheckedTargets('editTargetChips');
  if (payerIncluded && !targets.includes(payer)) targets.push(payer);
  if (!payerIncluded) targets = targets.filter(t => t !== payer);
  if (targets.length === 0) {
    errEl.textContent = '対象者を1人以上選択してください'; errEl.classList.add('show'); return;
  }

  const name = document.getElementById('editName').value.trim() || '無題';
  const idx = items.findIndex(i => i.id === editingId);
  if (idx !== -1) {
    items[idx] = { ...items[idx], name, amount: rawAmt, payer, targets, payerIncluded };
  }
  saveData();
  document.getElementById('editModal').classList.remove('open');
  editingId = null;
  renderHistory();
  renderSettlement();
  showToast('更新しました ✓');
}

/* =============================================
   SETTLEMENT LOGIC
   ============================================= */
function calcBalance() {
  // All arithmetic in integer yen — no floating-point involved
  const balance = {};
  members.forEach(m => balance[m] = 0);

  items.forEach(it => {
    const n = it.targets.length;
    if (n === 0) return; // guard: orphaned item
    const amount = Math.round(it.amount); // ensure integer
    const base = Math.floor(amount / n);
    const extra = amount - base * n; // exactly how many targets pay base+1
    it.targets.forEach((t, i) => {
      if (!(t in balance)) balance[t] = 0;
      balance[t] -= base + (i < extra ? 1 : 0);
    });
    if (!(it.payer in balance)) balance[it.payer] = 0;
    balance[it.payer] += amount;
  });

  return balance;
}

function minimizeTransfers(balance) {
  const creditors = [], debtors = [];
  Object.entries(balance).forEach(([name, val]) => {
    const v = Math.round(val);
    if (v > 0) creditors.push({ name, amt: v });
    else if (v < 0) debtors.push({ name, amt: -v });
  });
  // Sort descending for better matching
  creditors.sort((a,b) => b.amt - a.amt);
  debtors.sort((a,b) => b.amt - a.amt);

  const transfers = [];
  let ci = 0, di = 0;
  while (ci < creditors.length && di < debtors.length) {
    const amt = Math.min(creditors[ci].amt, debtors[di].amt);
    if (amt > 0) transfers.push({ from: debtors[di].name, to: creditors[ci].name, amt });
    creditors[ci].amt -= amt;
    debtors[di].amt -= amt;
    if (creditors[ci].amt <= 0) ci++;
    if (debtors[di].amt <= 0) di++;
  }
  return transfers;
}

function renderSettlement() {
  const balance = calcBalance();
  const transfers = minimizeTransfers(balance);

  // Balance tab
  const bRows = document.getElementById('balanceRows');
  if (members.length === 0) {
    bRows.innerHTML = '<div class="settled-msg">まだデータがありません</div>';
  } else {
    bRows.innerHTML = members.map(m => {
      const v = Math.round(balance[m] || 0);
      const cls = v > 0 ? 'balance-pos' : v < 0 ? 'balance-neg' : 'balance-zero';
      return `<div class="balance-row">
        <span class="balance-name">${escHtml(m)}</span>
        <span class="balance-val ${cls}">${v > 0 ? '+' : ''}${fmtAmt(v)}円</span>
      </div>`;
    }).join('');
  }

  // Settle tab
  const sRows = document.getElementById('settleRows');
  const sEmpty = document.getElementById('settleEmpty');
  if (transfers.length === 0) {
    sRows.innerHTML = '';
    sEmpty.textContent = items.length === 0 ? 'まだデータがありません' : '✅ 全員精算済み！';
    sEmpty.style.display = 'block';
  } else {
    sEmpty.style.display = 'none';
    sRows.innerHTML = transfers.map(t => `
      <div class="settlement-row">
        <span class="s-from">${escHtml(t.from)}</span>
        <span class="s-arrow">➡️</span>
        <span class="s-to">${escHtml(t.to)}</span>
        <span class="s-amount">¥${fmtAmt(t.amt)}</span>
      </div>
    `).join('');
  }
}

function switchTab(tab) {
  document.getElementById('tabSettle').classList.toggle('active', tab==='settle');
  document.getElementById('tabBalance').classList.toggle('active', tab==='balance');
  document.getElementById('settleView').style.display = tab==='settle' ? 'block' : 'none';
  document.getElementById('balanceView').style.display = tab==='balance' ? 'block' : 'none';
}

/* =============================================
   ⑧ COPY RESULT
   ============================================= */
function copySettlement() {
  const balance = calcBalance();
  const transfers = minimizeTransfers(balance);
  if (transfers.length === 0 && items.length === 0) { showToast('精算データがありません'); return; }

  const total = items.reduce((s,i) => s+i.amount, 0);
  const date = new Date().toLocaleDateString('ja-JP');
  let text = `【みことの集金精算】${date}\n`;
  text += `合計: ¥${fmtAmt(total)}\n`;
  text += `参加者: ${members.join('、')}\n\n`;

  if (transfers.length === 0) {
    text += '✅ 全員精算済み！';
  } else {
    text += '--- 送金ルート ---\n';
    transfers.forEach(t => { text += `${t.from} → ${t.to}  ¥${fmtAmt(t.amt)}\n`; });
  }

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 コピーしました！'))
      .catch(() => fallbackCopy(text));
  } else { fallbackCopy(text); }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showToast('📋 コピーしました！'); } catch(e) { showToast('コピーに失敗しました'); }
  document.body.removeChild(ta);
}

/* =============================================
   🖼 SAVE IMAGE — Web Share API + html2canvas
   ============================================= */
function saveImage() {
  if (typeof html2canvas === 'undefined') {
    showToast('画像ライブラリが読み込まれていません'); return;
  }
  if (items.length === 0) {
    showToast('データがありません'); return;
  }

  const balance   = calcBalance();
  const transfers = minimizeTransfers(balance);
  const total     = items.reduce((s, i) => s + i.amount, 0);
  const now       = new Date();
  const dateStr   = now.toLocaleDateString('ja-JP');
  const fileName  = `mikoto_${dateStr.replace(/\//g, '-')}.png`;

  /* ---- build report HTML ---- */
  // transfer rows
  let transfersHtml = '';
  if (transfers.length === 0) {
    transfersHtml = `<div class="ec-settled">✅ 全員精算済み！</div>`;
  } else {
    transfers.forEach(t => {
      transfersHtml += `
        <div class="ec-row">
          <span>${escHtml(t.from)}</span>
          <span class="ec-arrow">▶</span>
          <span>${escHtml(t.to)}</span>
          <span class="ec-amount">¥${fmtAmt(t.amt)}</span>
        </div>`;
    });
  }

  // balance rows
  let balanceHtml = members.map(m => {
    const v   = Math.round(balance[m] || 0);
    const cls = v > 0 ? 'ec-bal-pos' : v < 0 ? 'ec-bal-neg' : 'ec-bal-zero';
    const sign = v > 0 ? '+' : '';
    return `<div class="ec-bal">
      <span class="ec-bal-name">${escHtml(m)}</span>
      <span class="${cls}">${sign}${fmtAmt(v)}円</span>
    </div>`;
  }).join('');

  const card = document.getElementById('exportCard');
  card.innerHTML = `
    <div class="ec-accent"></div>
    <div class="ec-body">
      <div class="ec-app">みことの集金精算</div>
      <div class="ec-title">🧾 精算レポート</div>
      <div class="ec-date">${dateStr}</div>

      <div class="ec-meta">
        <span class="ec-chip">👥 参加者&nbsp;<span class="ec-chip-val">${members.length}人</span></span>
        <span class="ec-chip">📋 項目&nbsp;<span class="ec-chip-val">${items.length}件</span></span>
      </div>

      <div class="ec-total-box">
        <span class="ec-total-label">💳 合計金額</span>
        <span class="ec-total-val">¥${fmtAmt(total)}</span>
      </div>

      <div class="ec-section transfer">送金ルート</div>
      ${transfersHtml}

      <div class="ec-divider"></div>

      <div class="ec-section balance">収支明細</div>
      ${balanceHtml}

      <div class="ec-footer">
        <span class="ec-footer-app">みことの集金精算アプリ</span>
        <span class="ec-footer-dot">🧾</span>
      </div>
    </div>
  `;

  showToast('画像を生成中…');

  // scale:3 for crisp retina; letterRendering improves CJK
  html2canvas(card, {
    backgroundColor: null,
    scale: 3,
    useCORS: true,
    letterRendering: true,
    logging: false
  }).then(canvas => {
    canvas.toBlob(blob => {
      if (!blob) { showToast('画像生成に失敗しました'); return; }

      // --- Web Share API (files) — iPhone Safari / PWA ---
      const file = new File([blob], fileName, { type: 'image/png' });
      if (
        navigator.canShare &&
        navigator.canShare({ files: [file] }) &&
        navigator.share
      ) {
        navigator.share({
          title: 'みことの集金精算',
          files: [file]
        }).then(() => {
          showToast('📤 共有シートを開きました');
        }).catch(err => {
          // user cancelled — not an error
          if (err.name !== 'AbortError') showToast('共有に失敗しました');
        });
        return;
      }

      // --- Fallback: plain download (non-iOS / desktop) ---
      const url  = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = fileName;
      link.href = url;
      link.click();
      setTimeout(() => URL.revokeObjectURL(url), 60000);
      showToast('📸 画像を保存しました！');

    }, 'image/png');
  }).catch(() => showToast('画像生成に失敗しました'));
}

/* =============================================
   ③ SHARE (Web Share API)
   ============================================= */
function shareResult() {
  const balance = calcBalance();
  const transfers = minimizeTransfers(balance);
  const total = items.reduce((s,i) => s+i.amount, 0);
  const date = new Date().toLocaleDateString('ja-JP');

  let text = `【みことの集金精算】${date}\n合計: ¥${fmtAmt(total)}\n参加者: ${members.join('、')}\n\n`;
  if (transfers.length === 0) {
    text += '✅ 全員精算済み！';
  } else {
    transfers.forEach(t => { text += `${t.from} → ${t.to}  ¥${fmtAmt(t.amt)}\n`; });
  }

  if (navigator.share) {
    navigator.share({ title: 'みことの集金精算', text }).catch(() => {});
  } else {
    fallbackCopy(text);
  }
}
